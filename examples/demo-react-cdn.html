<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>drag-scroll-carousel — React CDN example</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/drag-scroll-carousel@1/style.css"
    />
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #f5f5f5;
        color: #111827;
      }
      .page {
        max-width: 960px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }
      .head h1 {
        margin: 0 0 6px;
        font-size: 1.4rem;
      }
      .head p {
        margin: 0 0 16px;
        color: #4b5563;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }
      .toolbar button {
        border: 1px solid #d1d5db;
        background: #fff;
        border-radius: 8px;
        width: 40px;
        height: 40px;
        cursor: pointer;
      }
      .strip {
        display: flex;
        gap: 12px;
        padding: 8px 0 12px;
      }
      .card {
        flex: 0 0 220px;
        min-width: 220px;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        background: #fff;
        overflow: hidden;
      }
      .card__img {
        width: 100%;
        height: 140px;
        object-fit: cover;
        display: block;
      }
      .card__body {
        padding: 10px 12px 12px;
      }
      .card__title {
        margin: 0 0 6px;
        font-size: 0.95rem;
      }
      .card__meta {
        margin: 0;
        color: #6b7280;
        font-size: 0.84rem;
      }
      .status {
        margin: 0 0 12px;
        color: #374151;
        font-size: 0.92rem;
      }
      .status.is-error {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/drag-scroll-carousel@1/index.js"></script>

    <script type="text/babel">
      const { useEffect, useRef, useState } = React;
      const API = "https://api.escuelajs.co/api/v1/products";

      function App() {
        const stripRef = useRef(null);
        const carouselRef = useRef(null);
        const [items, setItems] = useState([]);
        const [status, setStatus] = useState("Loading products...");

        useEffect(() => {
          let cancelled = false;

          (async () => {
            try {
              const res = await fetch(API);
              if (!res.ok) throw new Error("HTTP " + res.status);
              const data = await res.json();
              if (!Array.isArray(data)) throw new Error("Unexpected JSON");
              if (cancelled) return;

              const list = data.slice(0, 12);
              setItems(list);
              setStatus("Loaded " + list.length + " products.");
            } catch (err) {
              if (cancelled) return;
              const msg = err && err.message ? err.message : "Unknown error";
              setStatus("Could not load API data (" + msg + ").");
            }
          })();

          return () => {
            cancelled = true;
          };
        }, []);

        useEffect(() => {
          if (!stripRef.current || typeof DragCarousel === "undefined" || !items.length) return;

          if (carouselRef.current) {
            carouselRef.current.destroy();
            carouselRef.current = null;
          }

          carouselRef.current = new DragCarousel(stripRef.current, {
            speed: 1.5,
            buttons: { prev: "#prev-btn", next: "#next-btn" },
          });

          return () => {
            if (carouselRef.current) {
              carouselRef.current.destroy();
              carouselRef.current = null;
            }
          };
        }, [items]);

        return (
          <div className="page">
            <header className="head">
              <h1>React + drag-scroll-carousel (CDN demo)</h1>
              <p>
                React renders cards. <code>DragCarousel</code> adds drag scroll +
                prev/next behavior. Data loads from <code>{API}</code>.
              </p>
            </header>

            <p className={"status" + (status.startsWith("Could not") ? " is-error" : "")}>
              {status}
            </p>

            <div className="toolbar">
              <button id="prev-btn" aria-label="Previous">{"←"}</button>
              <button id="next-btn" aria-label="Next">{"→"}</button>
            </div>

            <div ref={stripRef} className="strip">
              {items.map((item) => (
                <article className="card" key={item.id}>
                  <img className="card__img" src={item.image} alt={item.title} />
                  <div className="card__body">
                    <h3 className="card__title">{item.title}</h3>
                    <p className="card__meta">
                      ID #{item.id} - ${Number(item.price || 0).toFixed(2)}
                    </p>
                  </div>
                </article>
              ))}
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("app")).render(<App />);
    </script>
  </body>
</html>
