<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>drag-scroll-carousel — React CDN example</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/drag-scroll-carousel@1/style.css"
    />
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #f5f5f5;
        color: #111827;
      }
      .page {
        max-width: 960px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }
      .head h1 {
        margin: 0 0 6px;
        font-size: 1.4rem;
      }
      .head p {
        margin: 0 0 16px;
        color: #4b5563;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        margin-bottom: 10px;
      }
      .toolbar button {
        border: 1px solid #d1d5db;
        background: #fff;
        border-radius: 8px;
        width: 40px;
        height: 40px;
        cursor: pointer;
      }
      .strip {
        display: flex;
        gap: 12px;
        padding: 8px 0 12px;
      }
      .card {
        flex: 0 0 220px;
        min-width: 220px;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        background: #fff;
        overflow: hidden;
      }
      .card__img {
        width: 100%;
        height: 140px;
        object-fit: cover;
        display: block;
      }
      .card__body {
        padding: 10px 12px 12px;
      }
      .card__title {
        margin: 0 0 6px;
        font-size: 0.95rem;
      }
      .card__meta {
        margin: 0;
        color: #6b7280;
        font-size: 0.84rem;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/drag-scroll-carousel@1/index.js"></script>

    <script type="text/babel">
      const { useEffect, useRef } = React;

      const items = Array.from({ length: 12 }, (_, i) => ({
        id: i + 1,
        title: "Product " + (i + 1),
        image: "https://picsum.photos/seed/drag-carousel-" + (i + 1) + "/500/300",
      }));

      function App() {
        const stripRef = useRef(null);

        useEffect(() => {
          if (!stripRef.current || typeof DragCarousel === "undefined") return;
          const carousel = new DragCarousel(stripRef.current, {
            speed: 1.5,
            buttons: { prev: "#prev-btn", next: "#next-btn" },
          });
          return () => carousel.destroy();
        }, []);

        return (
          <div className="page">
            <header className="head">
              <h1>React + drag-scroll-carousel (CDN demo)</h1>
              <p>
                React renders cards. <code>DragCarousel</code> adds drag scroll +
                prev/next behavior.
              </p>
            </header>

            <div className="toolbar">
              <button id="prev-btn" aria-label="Previous">{"←"}</button>
              <button id="next-btn" aria-label="Next">{"→"}</button>
            </div>

            <div ref={stripRef} className="strip">
              {items.map((item) => (
                <article className="card" key={item.id}>
                  <img className="card__img" src={item.image} alt={item.title} />
                  <div className="card__body">
                    <h3 className="card__title">{item.title}</h3>
                    <p className="card__meta">ID #{item.id}</p>
                  </div>
                </article>
              ))}
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("app")).render(<App />);
    </script>
  </body>
</html>
