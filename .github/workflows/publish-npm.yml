# Publishes to npm when package.json "version" is not already on the registry.
#
# Triggers: push to main/master, release published, workflow_dispatch
# Secret: NPM_TOKEN

name: Publish to npm

on:
  push:
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: npm-publish-${{ github.repository }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Read package name and version
        id: meta
        run: |
          VERSION=$(node --print "require('./package.json').version")
          NAME=$(node --print "require('./package.json').name")
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "name=${NAME}" >> "${GITHUB_OUTPUT}"

      - name: Skip if this version is already on npm
        id: skip
        run: |
          PKG="${{ steps.meta.outputs.name }}"
          VER="${{ steps.meta.outputs.version }}"
          if npm view "${PKG}@${VER}" version >/dev/null 2>&1; then
            echo "Version ${VER} is already published — skipping."
            echo "skip=true" >> "${GITHUB_OUTPUT}"
          else
            echo "Version ${VER} not on registry — will publish."
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Check NPM_TOKEN for publish
        if: steps.skip.outputs.skip != 'true'
        env:
          TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${TOKEN}" ]; then
            echo "::error::Secret NPM_TOKEN is missing. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Publish to npm
        if: steps.skip.outputs.skip != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
