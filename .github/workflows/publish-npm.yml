# Publish to npm when:
# - A PR that changes package.json is merged into main (push to main with package.json in the diff)
# - You publish a GitHub Release
# - You run this workflow manually (Actions → Publish to npm → Run workflow)
#
# Setup: Repository → Settings → Secrets and variables → Actions → New repository secret
#        Name: NPM_TOKEN  Value: npm automation token (classic or granular with publish)

name: Publish to npm

on:
  push:
    branches: [main]
    paths:
      - "package.json"
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Read package version
        id: meta
        run: |
          echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"
          echo "name=$(node -p \"require('./package.json').name\")" >> "$GITHUB_OUTPUT"

      - name: Skip if this version is already on npm
        id: skip
        run: |
          PKG="${{ steps.meta.outputs.name }}"
          VER="${{ steps.meta.outputs.version }}"
          if npm view "${PKG}@${VER}" version >/dev/null 2>&1; then
            echo "Version ${VER} is already published — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version ${VER} not on registry — will publish."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.skip.outputs.skip != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
